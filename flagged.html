  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flagged — infinite flag geography streak game — Bunny Game</title>
  <meta name="description" content="Eight flags. Two capitals sit closer together than any other pair. Find them. Streak as long as you can.">
  <meta property="og:title" content="Flagged — Bunny Game">
  <meta property="og:description" content="Eight flags. Two capitals sit closer together than any other pair. Find them. Streak as long as you can.">
  <meta property="og:url" content="https://www.thebunnygame.com/flagged">
  <link rel="canonical" href="https://www.thebunnygame.com/flagged">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>

    window.dataLayer = window.dataLayer || [];

    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/flagged.css">

<body>

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn">How to play</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="canvas-wrap">

  <!-- ── Loading ── -->
  <div id="fl-loading" class="fl-center">
    <p class="fl-loading-text">Loading flags…</p>
  </div>

  <!-- ── Game: select 2 flags ── -->
  <div id="fl-game" class="fl-hide">
    <div id="fl-info" class="fl-info"></div>
    <p id="fl-prompt" class="fl-prompt">Which 2 capitals are closest?</p>
    <div id="fl-flags" class="fl-flags-grid"></div>
    <div class="fl-submit-wrap">
      <button id="fl-submit" class="fl-submit-btn" disabled>Submit</button>
    </div>
  </div>

  <!-- ── Reveal: map + result ── -->
  <div id="fl-reveal" class="fl-hide">
    <div id="fl-reveal-outcome" class="fl-reveal-outcome"></div>
    <div id="fl-map-wrap" class="fl-map-wrap"></div>
    <div id="fl-distance" class="fl-distance"></div>
    <div class="fl-submit-wrap">
      <button id="fl-next" class="fl-submit-btn">Next Round</button>
    </div>
  </div>

  <!-- ── Run end ── -->
  <div id="fl-end" class="fl-hide fl-end-screen">
    <h2 class="fl-end-headline">Flagged</h2>
    <div id="fl-streak-display" class="fl-streak-display"></div>
    <div class="fl-end-btns">
      <button id="fl-share" class="fl-submit-btn">Share</button>
      <button id="fl-play-again" class="fl-play-again-btn">Play Again</button>
    </div>
  </div>

</div>

<footer id="footer">
  <span>©2026 Never Stop Creating, LLC</span>
  <span>·</span>
  <a href="mailto:info@neverstopcreatingllc.com">info@neverstopcreatingllc.com</a>
  <span>·</span>
  <a href="macigame.html">About</a>
</footer>

<div id="overlay" class="hidden">
  <div class="modal">
    <div id="perf-banner" class="hidden"></div>
    <h2 id="modal-title"></h2>
    <p class="modal-score" id="modal-score"></p>
    <p class="modal-sub" id="modal-sub"></p>
    <div class="breakdown" id="breakdown" style="display:none"></div>
    <button class="play-again-btn" id="play-again-btn"></button>
    <button class="share-btn" id="share-btn" style="display:none"></button>
  </div>
</div>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to play</p>
    <p class="dir-pane" id="directions-text"></p>
    <button class="dir-close-btn" id="dir-close-btn">Got it</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/flagged.js"></script>
</body>
</html>
