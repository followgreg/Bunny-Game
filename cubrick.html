<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cubrick — 8-level puzzle — Bunny Game</title>
  <meta name="description" content="Fill the board. Build the cube. Eight levels of polyomino puzzles on Bunny Game.">
  <meta property="og:title" content="Cubrick — 8-level puzzle">
  <meta property="og:description" content="Fill the board. Build the cube. Eight levels of polyomino puzzles on Bunny Game.">
  <meta property="og:url" content="https://www.thebunnygame.com/cubrick">
  <link rel="canonical" href="https://www.thebunnygame.com/cubrick">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#E8DCC8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/cubrick.css">
</head>
<body data-tab="cubrick">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
    <button class="icon-btn" id="new-btn">↺ New</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="cubrick-wrap">

  <!-- HUD: level indicator, move counter, action buttons -->
  <div id="cub-hud">
    <div id="cub-hud-left">
      <span id="cub-level-label">Level <span id="cub-level">1</span> of 8</span>
      <span id="cub-moves-label">Moves <span id="cub-moves">0</span></span>
    </div>
    <div id="cub-hud-right">
      <button class="cub-btn" id="cub-rotate-btn" disabled>Rotate ↻</button>
      <button class="cub-btn" id="cub-undo-btn" disabled>Undo</button>
      <button class="cub-btn" id="cub-reset-btn">Reset</button>
    </div>
  </div>

  <!-- Board: flat 8×8 grid (cells injected by cubrick.js) -->
  <div id="cub-board-area">
    <div id="cub-grid"></div>
  </div>

  <!-- Piece tray + progress cube widget -->
  <div id="cub-tray-row">
    <div id="cub-tray">
      <!-- Piece items injected by cubrick.js -->
    </div>
    <div id="cub-progress-wrap">
      <canvas id="cub-progress-cube" aria-label="Levels complete"></canvas>
      <span id="cub-progress-label">0 / 8</span>
    </div>
  </div>

  <!-- Level-complete overlay (hidden until a level is finished) -->
  <div id="cub-level-complete" class="cub-overlay hidden">
    <div class="cub-modal">
      <p class="cub-headline">Level <span id="cub-lc-num"></span> complete!</p>
      <p class="cub-subline" id="cub-lc-moves"></p>
      <button class="cub-btn cub-btn-primary" id="cub-next-btn">Next Level →</button>
    </div>
  </div>

  <!-- Final win screen (hidden until all 8 levels done) -->
  <div id="cub-win" class="cub-overlay hidden">
    <div class="cub-modal">
      <p class="cub-headline">Cubrick Complete!</p>
      <canvas id="cub-win-cube"></canvas>
      <p class="cub-subline" id="cub-win-moves"></p>
      <div class="cub-modal-btns">
        <button class="cub-btn" id="cub-share-btn">Share</button>
        <button class="cub-btn cub-btn-primary" id="cub-play-again-btn">Play Again</button>
      </div>
    </div>
  </div>

</div><!-- /#cubrick-wrap -->

<footer id="footer">
  <span>©2026 Never Stop Creating, LLC</span>
  <span>·</span>
  <a href="mailto:info@neverstopcreatingllc.com">info@neverstopcreatingllc.com</a>
  <span>·</span>
  <a href="macigame.html">About</a>
</footer>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/cubrick.js"></script>
</body>
</html>
