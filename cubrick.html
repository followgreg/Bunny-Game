<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cubrick — isometric city puzzle — Bunny Game</title>
  <meta name="description" content="Place pieces on the monolith. Watch a city rise. Cubrick is an isometric puzzle game on Bunny Game.">
  <meta property="og:title" content="Cubrick — isometric city puzzle">
  <meta property="og:description" content="Place pieces on the monolith. Watch a city rise. Cubrick is an isometric puzzle game on Bunny Game.">
  <meta property="og:url" content="https://www.thebunnygame.com/cubrick">
  <link rel="canonical" href="https://www.thebunnygame.com/cubrick">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#E8DCC8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/cubrick.css">
</head>
<body data-tab="cubrick">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
    <button class="icon-btn" id="new-btn">↺ New</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="cubrick-wrap">

  <!-- HUD: move counter + controls -->
  <div id="cub-hud">
    <span id="cub-moves-label">Moves <span id="cub-moves">0</span></span>
    <div id="cub-controls">
      <button class="cub-btn" id="cub-rotate-btn" disabled>Rotate ↻</button>
      <button class="cub-btn" id="cub-undo-btn" disabled>Undo</button>
      <button class="cub-btn" id="cub-reset-btn">Reset</button>
    </div>
  </div>

  <!-- Main play area: isometric canvas (dominant) -->
  <div id="cub-canvas-area">
    <div id="cub-canvas-wrap">
      <canvas id="cub-canvas"></canvas>
    </div>
  </div>

  <!-- Piece tray: scrollable row of piece previews -->
  <div id="cub-tray">
    <!-- Piece items injected by cubrick.js -->
  </div>

  <!-- Results screen (hidden until win) -->
  <div id="cub-results">
    <h2 class="cub-results-headline">City Complete</h2>
    <p class="cub-results-subline" id="cub-results-subline"></p>
    <button class="cub-btn cub-btn-primary" id="share-btn">Share</button>
    <button class="cub-btn" id="cub-new-puzzle-btn">New Puzzle</button>
  </div>

</div><!-- /#cubrick-wrap -->

<footer id="footer">
  <span>©2026 Never Stop Creating, LLC</span>
  <span>·</span>
  <a href="mailto:info@neverstopcreatingllc.com">info@neverstopcreatingllc.com</a>
  <span>·</span>
  <a href="macigame.html">About</a>
</footer>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/cubrick.js"></script>
</body>
</html>
