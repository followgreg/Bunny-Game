<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tonal — a color and sound memory game — Bunny Game</title>
  <meta name="description" content="Five colors. Five notes. One chord. How well do you hear color?">
  <meta property="og:title" content="Tonal — Bunny Game">
  <meta property="og:description" content="Five colors. Five notes. One chord. How well do you hear color?">
  <meta property="og:url" content="https://www.thebunnygame.com/tonal">
  <meta property="og:image" content="https://www.thebunnygame.com/assets/og-images/tonal-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.thebunnygame.com/assets/og-images/tonal-og.png">
  <link rel="canonical" href="https://www.thebunnygame.com/tonal">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/tonal.css">
</head>
<body>

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="canvas-wrap">

  <!-- Sine-wave texture overlay (decorative) -->
  <div id="tn-texture"></div>

  <!-- Splash -->
  <div id="tn-splash">
    <img id="tn-logo" src="assets/logos/tonal_logo.svg" alt="Tonal">
    <p id="tn-directions" class="tn-directions"></p>
    <button id="tn-start-btn">Play</button>
  </div>

  <!-- Reveal phase: 5 bars light up one by one, then full chord -->
  <div id="tn-reveal" class="tn-hide">
    <img class="tn-phase-logo" src="assets/logos/tonal_logo.svg" alt="Tonal">
    <div id="tn-bars-wrap">
      <div class="tn-bar" id="tn-bar-0"></div>
      <div class="tn-bar" id="tn-bar-1"></div>
      <div class="tn-bar" id="tn-bar-2"></div>
      <div class="tn-bar" id="tn-bar-3"></div>
      <div class="tn-bar" id="tn-bar-4"></div>
    </div>
    <p id="tn-reveal-status" class="tn-status-text"></p>
  </div>

  <!-- Bar show phase: one bar's color displayed with countdown -->
  <div id="tn-bar-show" class="tn-hide">
    <img class="tn-phase-logo" src="assets/logos/tonal_logo.svg" alt="Tonal">
    <p class="tn-bar-label" id="tn-show-label">Bar 1 of 5</p>
    <div id="tn-show-swatch"></div>
    <p id="tn-show-countdown" class="tn-countdown"></p>
  </div>

  <!-- Bar pick phase: native color picker for current bar -->
  <div id="tn-bar-pick" class="tn-hide">
    <img class="tn-phase-logo" src="assets/logos/tonal_logo.svg" alt="Tonal">
    <p class="tn-bar-label" id="tn-pick-label">Bar 1 of 5</p>
    <p class="tn-prompt">What color was it?</p>
    <div class="tn-picker-wrap">
      <!-- label triggers the hidden input natively on all browsers including iOS Safari -->
      <input type="color" id="tn-single-input" value="#808080">
      <label for="tn-single-input" id="tn-single-swatch" class="tn-pick-swatch-large"></label>
      <p class="tn-tap-hint">Tap to pick color</p>
    </div>
    <button id="tn-single-submit">Submit</button>
  </div>

  <!-- Per-bar result: original vs picked for this bar -->
  <div id="tn-bar-result" class="tn-hide">
    <img class="tn-phase-logo" src="assets/logos/tonal_logo.svg" alt="Tonal">
    <p class="tn-bar-label" id="tn-bar-result-label">Bar 1 of 5</p>
    <p class="tn-bar-score-text" id="tn-bar-score-text"></p>
    <div class="tn-bar-result-row">
      <div class="tn-bar-result-col">
        <p class="tn-result-label">Original</p>
        <div class="tn-result-bar-tall" id="tn-bar-orig-swatch"></div>
      </div>
      <div class="tn-bar-result-col">
        <p class="tn-result-label">Your Pick</p>
        <div class="tn-result-bar-tall" id="tn-bar-picked-swatch"></div>
      </div>
    </div>
    <button id="tn-bar-next-btn">Next</button>
  </div>

  <!-- Final result screen -->
  <div id="tn-result" class="tn-hide">
    <img class="tn-phase-logo" src="assets/logos/tonal_logo.svg" alt="Tonal">
    <div id="tn-result-pairs"></div>
    <p id="tn-total-score" class="tn-total-score"></p>
    <p id="tn-bar-scores" class="tn-bar-scores"></p>
    <div class="tn-result-btns">
      <button class="tn-btn-ghost"   id="tn-again-btn">Play Again</button>
      <button class="tn-btn-primary" id="tn-share-btn">Share</button>
    </div>
  </div>

</div>

<!-- Directions overlay -->
<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <p class="dir-pane" id="directions-text"></p>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/tonal.js"></script>
</body>
</html>
