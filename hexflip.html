<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HexFlip — Bunny Game</title>
  <meta name="description" content="A hex grid logic puzzle. Click exactly 3 hexes to turn the whole board black. One solution. Find it.">
  <meta property="og:title" content="HexFlip">
  <meta property="og:description" content="A hex grid. All black is the goal. 3 clicks. One solution.">
  <meta property="og:url" content="https://www.thebunnygame.com/hexflip">
  <link rel="canonical" href="https://www.thebunnygame.com/hexflip">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>

    gtag('config', 'G-7HC7SYBNKX');

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/hexflip.css">

<body data-tab="hexflip">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
    <button class="icon-btn" id="new-btn">↺ New</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="stats">
  <div class="stat-item">
    <span class="stat-label">Black</span>
    <span class="stat-value" id="val-hf-black">—</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">White</span>
    <span class="stat-value" id="val-hf-white">—</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Tries</span>
    <span class="stat-value" id="val-hf-tries">0</span>
  </div>
</div>

<div id="hexflip-wrap">
  <div id="hf-pips">
    <span id="hf-level-label" class="hf-level-label"></span>
    <span class="hf-pip-sep">·</span>
    <span class="hf-pip" id="hf-pip-0"></span>
    <span class="hf-pip" id="hf-pip-1"></span>
    <span class="hf-pip" id="hf-pip-2"></span>
  </div>
  <div id="hf-board-wrap">
    <svg id="hf-svg"></svg>
  </div>
  <div id="hf-win-state">
    <p class="hf-win-headline" id="hf-win-headline"></p>
    <p class="hf-win-subline"  id="hf-win-subline"></p>
    <button class="hf-btn hf-btn-primary" id="hf-next-level-btn">Next Level →</button>
    <button class="hf-btn" id="hf-copy-result-btn">Copy Result</button>
  </div>
  <div id="hf-feedback"></div>
  <div id="hf-controls">
    <button class="hf-btn" id="hf-reset-btn">↺ Reset</button>
    <button class="hf-btn" id="hf-show-solution-btn" style="display:none">Show Solution</button>
    <button class="hf-btn hf-btn-primary" id="hf-skip-btn" style="display:none">Next Level →</button>
  </div>
  <div id="hf-solution-panel" style="display:none"></div>
  <div id="hf-progress"></div>
</div>

<footer id="footer">
  <span>©2026 Never Stop Creating, LLC</span>
  <span>·</span>
  <a href="mailto:info@neverstopcreatingllc.com">info@neverstopcreatingllc.com</a>
  <span>·</span>
  <a href="macigame.html">About</a>
</footer>

<div id="overlay" class="hidden">
  <div class="modal">
    <div id="perf-banner" class="hidden"></div>
    <h2 id="modal-title">HexFlip</h2>
    <p class="modal-score" id="modal-score"></p>
    <p class="modal-sub"   id="modal-sub"></p>
    <div class="breakdown" id="modal-breakdown"></div>
    <button class="play-again-btn" id="play-again-btn">Play Again</button>
    <button class="share-btn" id="share-btn">Share Score</button>
  </div>
</div>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/hexflip.js"></script>
</body>
</html>
