<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sound Destroyer — Bunny Game</title>
  <meta name="description" content="Match the frequency. Fire the laser. Destroy the grid.">
  <meta property="og:title" content="Sound Destroyer — Bunny Game">
  <meta property="og:description" content="Match the frequency. Fire the laser. Destroy the grid.">
  <meta property="og:url" content="https://www.thebunnygame.com/sounddestroyer">
  <link rel="canonical" href="https://www.thebunnygame.com/sounddestroyer">
  <!-- PWA -->

  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/sounddestroyer.css">
</head>
<body data-tab="sounddestroyer">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
  </div>
</div>

<div id="nav-root"></div>

<!-- ── Splash ─────────────────────────────────────────────────────────────── -->
<div id="sd-splash">
  <img src="assets/logos/sounddestroyer_logo.svg" alt="Sound Destroyer" id="sd-splash-logo"
       onerror="this.style.display='none'">
  <p id="sd-splash-text">
    A tone plays. Match it with the dial.<br>
    Fire your laser at a column.<br>
    Your accuracy = your damage.<br>
    Clear all 100 monsters to advance.<br>
    100 rounds. Get to the end.
  </p>
  <p id="sd-splash-warning">⚠ TURN YOUR VOLUME ON<br>THIS GAME IS SOUND-BASED</p>
  <button id="sd-play-btn">PLAY</button>
</div>

<!-- ── Game screen ────────────────────────────────────────────────────────── -->
<div id="sd-wrap" class="hidden">

  <!-- HUD -->
  <div id="sd-hud">
    <div id="sd-round-label">ROUND 1</div>
    <div id="sd-shots-row"><!-- shot icons injected by JS --></div>
  </div>

  <div id="sd-play-area">

    <!-- Monster grid -->
    <div id="sd-grid-container">
      <div id="sd-grid">
        <!-- 100 cells injected by JS -->
      </div>
      <!-- Shatter particle canvas (below laser) -->
      <canvas id="sd-shatter-canvas" style="position:absolute;inset:0;pointer-events:none;z-index:5;"></canvas>
      <!-- Laser beam canvas (above shatter) -->
      <canvas id="sd-laser-beam"></canvas>
    </div>

    <!-- Column aim indicators -->
    <div id="sd-col-indicators">
      <!-- 10 chevrons injected by JS -->
    </div>

    <!-- Laser cannon -->
    <div id="sd-cannon-row">
      <div id="sd-cannon">
        <svg viewBox="0 0 28 32" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer chevron body -->
          <polyline class="cannon-body" points="2,30 14,2 26,30"/>
          <!-- Inner detail lines -->
          <polyline class="cannon-body" points="8,30 14,12 20,30" style="stroke-width:1;opacity:0.5;"/>
          <!-- Base bar -->
          <line class="cannon-body" x1="3" y1="30" x2="25" y2="30" style="stroke-width:2;"/>
        </svg>
      </div>
    </div>

    <!-- Phase label (LISTEN / AIM / FIRE) -->
    <div id="sd-phase-label">SELECT A COLUMN</div>

    <!-- Shot result readout -->
    <div id="sd-shot-result"></div>

  </div><!-- /sd-play-area -->

  <!-- Dial section -->
  <div id="sd-dial-section">
    <div id="sd-listen-label"></div>
    <canvas id="sd-dial-canvas"></canvas>
    <div id="sd-hz-display">— Hz</div>
    <div id="sd-controls">
      <button class="sd-btn" id="sd-replay-btn" disabled>↻ REPLAY</button>
      <button class="sd-btn" id="sd-fire-btn" disabled>FIRE</button>
    </div>
  </div>

</div><!-- /sd-wrap -->

<!-- ── Game over ──────────────────────────────────────────────────────────── -->
<div id="sd-gameover" class="hidden">
  <div id="sd-gameover-title">GAME<br>OVER</div>
  <div id="sd-gameover-sub"></div>
  <button class="sd-end-btn" id="sd-restart-btn">TRY AGAIN</button>
</div>

<!-- ── Win ────────────────────────────────────────────────────────────────── -->
<div id="sd-win" class="hidden">
  <div id="sd-win-title">YOU<br>WIN</div>
  <div id="sd-win-sub">ALL 100 ROUNDS CLEARED</div>
  <button class="sd-end-btn" id="sd-win-restart-btn">PLAY AGAIN</button>
</div>

<!-- ── Directions popup ───────────────────────────────────────────────────── -->
<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/pitch.js"></script>
<script src="assets/js/sounddestroyer.js"></script>
<script>
(function () {
  'use strict';

  var COLS = 10, ROWS = 10;
  var DIRECTIONS = 'A tone plays. Turn the dial to match it. Aim at a column, then FIRE — your accuracy (0-100) determines how many columns the laser destroys. Clear all 100 monsters to advance. Run out of shots: Game Over. 100 rounds. Volume on.';

  var SHOT_STATES = {
    AIMING:      'aiming',
    LISTENING:   'listening',
    DIALING:     'dialing',
    FIRING:      'firing',
    SHOT_RESULT: 'shot_result',
    ROUND_CLEAR: 'round_clear',
    GAME_OVER:   'game_over',
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  var splashEl      = document.getElementById('sd-splash');
  var wrapEl        = document.getElementById('sd-wrap');
  var gameoverEl    = document.getElementById('sd-gameover');
  var winEl         = document.getElementById('sd-win');
  var hudRoundEl    = document.getElementById('sd-round-label');
  var shotsRowEl    = document.getElementById('sd-shots-row');
  var gridEl        = document.getElementById('sd-grid');
  var colIndEl      = document.getElementById('sd-col-indicators');
  var cannonEl      = document.getElementById('sd-cannon');
  var cannonRowEl   = document.getElementById('sd-cannon-row');
  var phaseLabelEl  = document.getElementById('sd-phase-label');
  var shotResultEl  = document.getElementById('sd-shot-result');
  var listenLabelEl = document.getElementById('sd-listen-label');
  var hzEl          = document.getElementById('sd-hz-display');
  var dialCanvas    = document.getElementById('sd-dial-canvas');
  var dialSection   = document.getElementById('sd-dial-section');
  var replayBtn     = document.getElementById('sd-replay-btn');
  var fireBtn       = document.getElementById('sd-fire-btn');
  var laserCanvas   = document.getElementById('sd-laser-beam');
  var shatterCanvas = document.getElementById('sd-shatter-canvas');

  // ── Game state ─────────────────────────────────────────────────────────────
  var gameState     = SHOT_STATES.AIMING;
  var currentRound  = 1;
  var shotsLeft     = 0;
  var aimedCol      = null;
  var targetHz      = null;
  var cells         = [];
  var alive         = [];
  var colIndicators = [];

  // ── Canvas contexts (set up after grid is in DOM) ──────────────────────────
  var _laserCtx   = null;
  var _shatterCtx = null;
  var _canvasW    = 0;  // logical grid width
  var _canvasH    = 0;  // logical grid height

  function setupCanvases() {
    var dpr = window.devicePixelRatio || 1;
    _canvasW = gridEl.offsetWidth;
    _canvasH = gridEl.offsetHeight;
    [laserCanvas, shatterCanvas].forEach(function (c) {
      c.width  = Math.round(_canvasW * dpr);
      c.height = Math.round(_canvasH * dpr);
      var ctx = c.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    });
    _laserCtx   = laserCanvas.getContext('2d');
    _shatterCtx = shatterCanvas.getContext('2d');
  }

  // ── Shatter particle system ────────────────────────────────────────────────
  var _particles    = [];
  var _shatterAnimId = null;

  function addShatterAt(cellIdx) {
    alive[cellIdx] = false;
    cells[cellIdx].classList.add('dead');
    cells[cellIdx].classList.remove('targeted');

    if (!_shatterCtx) return;
    var cell     = cells[cellIdx];
    var gridRect = gridEl.getBoundingClientRect();
    var cellRect = cell.getBoundingClientRect();
    var cx = cellRect.left - gridRect.left + cellRect.width  / 2;
    var cy = cellRect.top  - gridRect.top  + cellRect.height / 2;
    var r  = cellRect.width * 0.28;

    for (var i = 0; i < 10; i++) {
      var angle = (i / 10) * Math.PI * 2 + (Math.random() - 0.5) * 0.55;
      var speed = r * (0.055 + Math.random() * 0.09);
      _particles.push({
        x: cx + Math.cos(angle) * r * 0.2,
        y: cy + Math.sin(angle) * r * 0.2,
        dx:   Math.cos(angle) * speed,
        dy:   Math.sin(angle) * speed,
        len:  r * (0.35 + Math.random() * 0.5),
        perp: angle + Math.PI / 2,
        alpha: 1,
      });
    }
    if (!_shatterAnimId) _shatterAnimId = requestAnimationFrame(_tickShatter);
  }

  function _tickShatter() {
    _shatterCtx.clearRect(0, 0, _canvasW, _canvasH);
    var any = false;
    for (var i = 0; i < _particles.length; i++) {
      var p = _particles[i];
      p.x += p.dx; p.y += p.dy; p.alpha -= 0.033;
      if (p.alpha <= 0) continue;
      any = true;
      _shatterCtx.globalAlpha = p.alpha;
      var hx = Math.cos(p.perp) * p.len / 2;
      var hy = Math.sin(p.perp) * p.len / 2;
      _shatterCtx.beginPath();
      _shatterCtx.moveTo(p.x - hx, p.y - hy);
      _shatterCtx.lineTo(p.x + hx, p.y + hy);
      _shatterCtx.strokeStyle = '#00FFFF';
      _shatterCtx.lineWidth   = 1.5;
      _shatterCtx.lineCap     = 'round';
      _shatterCtx.stroke();
    }
    _shatterCtx.globalAlpha = 1;
    _particles = _particles.filter(function (p) { return p.alpha > 0; });
    _shatterAnimId = any ? requestAnimationFrame(_tickShatter) : null;
  }

  // ── Beam drawing helpers ───────────────────────────────────────────────────
  function _beamWidth(score) {
    if (score >= 90) return 7;
    if (score >= 70) return 5;
    if (score >= 50) return 3.5;
    if (score >= 30) return 2.5;
    return 1.5;
  }

  function _drawBeam(ctx, x, fromY, toY, bw) {
    // Outer glow
    ctx.beginPath(); ctx.moveTo(x, fromY); ctx.lineTo(x, toY);
    ctx.strokeStyle = 'rgba(255,100,0,0.22)';
    ctx.lineWidth   = bw * 6; ctx.lineCap = 'round'; ctx.stroke();
    // Core
    ctx.beginPath(); ctx.moveTo(x, fromY); ctx.lineTo(x, toY);
    ctx.strokeStyle = '#FF4500'; ctx.lineWidth = bw; ctx.stroke();
    // Hot white centre
    ctx.beginPath(); ctx.moveTo(x, fromY); ctx.lineTo(x, toY);
    ctx.strokeStyle = 'rgba(255,210,150,0.88)';
    ctx.lineWidth   = Math.max(0.5, bw * 0.35); ctx.stroke();
  }

  function _fadeBeams(xs, bw, onDone) {
    var startTs = null, fadeMs = 200;
    (function frame(ts) {
      if (!startTs) startTs = ts;
      var fp = Math.min(1, (ts - startTs) / fadeMs);
      _laserCtx.clearRect(0, 0, _canvasW, _canvasH);
      _laserCtx.globalAlpha = 1 - fp;
      xs.forEach(function (x) { _drawBeam(_laserCtx, x, _canvasH, 0, bw); });
      _laserCtx.globalAlpha = 1;
      if (fp < 1) requestAnimationFrame(frame);
      else { laserCanvas.style.display = 'none'; onDone(); }
    })();
  }

  // ── Fire sequence ──────────────────────────────────────────────────────────
  function runFireSequence(col, score, destroyedCols, onDone) {
    // 1. Cannon recoil
    cannonEl.classList.remove('recoil');
    void cannonEl.offsetWidth;
    cannonEl.classList.add('recoil');

    setTimeout(function () {
      // 2. Row-by-row beam through main column
      var cellW  = _canvasW / COLS;
      var cellH  = _canvasH / ROWS;
      var beamX  = cellW * col + cellW / 2;
      var bw     = _beamWidth(score);
      var row    = ROWS - 1;
      laserCanvas.style.display = 'block';

      (function stepRow() {
        _laserCtx.clearRect(0, 0, _canvasW, _canvasH);
        _drawBeam(_laserCtx, beamX, _canvasH, row * cellH, bw);
        // Shatter monster in this row of the main column
        var idx = row * COLS + col;
        if (alive[idx]) addShatterAt(idx);
        row--;
        if (row >= 0) {
          setTimeout(stepRow, 65);
        } else {
          // 3. Spread columns — simultaneous shatter + rising beams
          var spreadCols = destroyedCols.filter(function (c) { return c !== col; });
          if (spreadCols.length > 0) {
            // Shatter all monsters in spread columns at once
            spreadCols.forEach(function (sc) {
              for (var r = 0; r < ROWS; r++) {
                var si = r * COLS + sc;
                if (alive[si]) addShatterAt(si);
              }
            });
            // Animate spread beams rising
            var startTs = null, riseMs = 260;
            var spreadBW = Math.max(1, bw * 0.65);
            (function spreadFrame(ts) {
              if (!startTs) startTs = ts;
              var progress = Math.min(1, (ts - startTs) / riseMs);
              _laserCtx.clearRect(0, 0, _canvasW, _canvasH);
              spreadCols.forEach(function (sc) {
                _drawBeam(_laserCtx, cellW * sc + cellW / 2, _canvasH, _canvasH * (1 - progress), spreadBW);
              });
              if (progress < 1) { requestAnimationFrame(spreadFrame); }
              else {
                var allXs = spreadCols.map(function (sc) { return cellW * sc + cellW / 2; });
                _fadeBeams(allXs, spreadBW, function () { cannonEl.classList.remove('recoil'); onDone(); });
              }
            })();
          } else {
            _fadeBeams([beamX], bw, function () { cannonEl.classList.remove('recoil'); onDone(); });
          }
        }
      })();
    }, 160);
  }

  // ── State machine ──────────────────────────────────────────────────────────
  function setState(s) {
    gameState = s;
    var showDial = (s === SHOT_STATES.LISTENING || s === SHOT_STATES.DIALING);
    dialSection.classList.toggle('hidden', !showDial);

    if (s === SHOT_STATES.AIMING) {
      phaseLabelEl.textContent  = 'SELECT A COLUMN';
      shotResultEl.innerHTML    = '';
      shotResultEl.classList.remove('sd-result-active');
      listenLabelEl.textContent = '';
      replayBtn.disabled = true;
      fireBtn.disabled   = true;
    } else if (s === SHOT_STATES.LISTENING) {
      phaseLabelEl.textContent  = 'MATCH THE TONE';
      listenLabelEl.textContent = 'INCOMING SIGNAL';
      hzEl.textContent          = '— Hz';
      Pitch.setDialLocked(true);
      replayBtn.disabled = true;
      fireBtn.disabled   = true;
    } else if (s === SHOT_STATES.DIALING) {
      listenLabelEl.textContent = '';
      phaseLabelEl.textContent  = 'DIAL IN — THEN FIRE';
      Pitch.setDialLocked(false);
      hzEl.textContent = Math.round(Pitch.getDialFrequency()) + ' Hz';
      replayBtn.disabled = false;
      fireBtn.disabled   = false;
    } else if (s === SHOT_STATES.FIRING) {
      phaseLabelEl.textContent = '';
      replayBtn.disabled = true;
      fireBtn.disabled   = true;
    } else if (s === SHOT_STATES.SHOT_RESULT) {
      shotResultEl.classList.add('sd-result-active');
      phaseLabelEl.textContent = '';
    }
  }

  // ── Build grid ─────────────────────────────────────────────────────────────
  function buildGrid() {
    gridEl.innerHTML = '';
    cells = []; alive = [];
    for (var i = 0; i < ROWS * COLS; i++) {
      var cell = document.createElement('div');
      cell.className = 'sd-cell';
      var img = document.createElement('img');
      img.src = 'assets/icons/monsterbunny.svg?v=2';
      img.className = 'sd-monster'; img.alt = '';
      cell.appendChild(img);
      gridEl.appendChild(cell);
      cells.push(cell); alive.push(true);
    }
    requestAnimationFrame(setupCanvases);
  }

  // ── Build column indicators ────────────────────────────────────────────────
  function buildColIndicators() {
    colIndEl.innerHTML = ''; colIndicators = [];
    for (var c = 0; c < COLS; c++) {
      (function (col) {
        var ind = document.createElement('div');
        ind.className = 'sd-col-indicator';
        ind.innerHTML = '<svg viewBox="0 0 10 8" xmlns="http://www.w3.org/2000/svg">' +
          '<polyline class="ind-chevron" points="1,7 5,1 9,7"/></svg>';
        ind.addEventListener('click', function () { aimColumn(col); });
        colIndEl.appendChild(ind);
        colIndicators.push(ind);
      })(c);
    }
  }

  // ── Aim column ─────────────────────────────────────────────────────────────
  function aimColumn(col) {
    if (gameState !== SHOT_STATES.AIMING) return;
    aimedCol = col;
    cells.forEach(function (cell, idx) {
      cell.classList.toggle('targeted', (idx % COLS === col) && alive[idx]);
    });
    colIndicators.forEach(function (ind, c) { ind.classList.toggle('aimed', c === col); });
    positionCannon(col);
    setState(SHOT_STATES.LISTENING);
    Pitch.resetDial();
    targetHz = Pitch.generateTargetFrequency();
    var duration = SoundDestroyer.getRoundConfig(currentRound)[1];
    Pitch.playTargetTone(targetHz, duration);
    setTimeout(function () { setState(SHOT_STATES.DIALING); }, Math.round(duration * 1000) + 200);
  }

  function positionCannon(col) {
    requestAnimationFrame(function () {
      var gridRect = gridEl.getBoundingClientRect();
      var rowRect  = cannonRowEl.getBoundingClientRect();
      var cellW    = gridRect.width / COLS;
      cannonEl.style.left = ((gridRect.left - rowRect.left) + cellW * col + cellW / 2) + 'px';
    });
  }

  // ── Replay ─────────────────────────────────────────────────────────────────
  replayBtn.addEventListener('click', function () {
    if (gameState !== SHOT_STATES.DIALING) return;
    Pitch.stopLiveTone();
    replayBtn.disabled = true; fireBtn.disabled = true;
    Pitch.setDialLocked(true);
    listenLabelEl.textContent = 'INCOMING SIGNAL';
    var duration = SoundDestroyer.getRoundConfig(currentRound)[1];
    Pitch.playTargetTone(targetHz, duration);
    setTimeout(function () {
      listenLabelEl.textContent = '';
      Pitch.setDialLocked(false);
      hzEl.textContent = Math.round(Pitch.getDialFrequency()) + ' Hz';
      replayBtn.disabled = false; fireBtn.disabled = false;
    }, Math.round(duration * 1000) + 200);
  });

  // ── Fire ───────────────────────────────────────────────────────────────────
  fireBtn.addEventListener('click', function () {
    if (gameState !== SHOT_STATES.DIALING || aimedCol === null) return;
    Pitch.stopLiveTone();

    var playerHz     = Pitch.getDialFrequency();
    var score        = Pitch.scoreAccuracy(targetHz, playerHz);
    var colsHit      = SoundDestroyer.calculateColumnsDestroyed(score);
    var destroyedCols = SoundDestroyer.getDestroyedColumns(aimedCol, colsHit, COLS);

    shotsLeft--;
    updateShotsHUD();

    // Clear targeted highlights (beam handles destruction)
    cells.forEach(function (c) { c.classList.remove('targeted'); });
    colIndicators.forEach(function (i) { i.classList.remove('aimed'); });

    setState(SHOT_STATES.FIRING);

    runFireSequence(aimedCol, score, destroyedCols, function () {
      var remaining = alive.filter(Boolean).length;

      // SHOT_RESULT display
      setState(SHOT_STATES.SHOT_RESULT);
      var lines = [
        'ACCURACY: ' + score + '%',
        colsHit === 0
          ? 'MISS — 0 COLUMNS DESTROYED'
          : colsHit + ' COLUMN' + (colsHit !== 1 ? 'S' : '') + ' DESTROYED',
        remaining + ' MONSTER' + (remaining !== 1 ? 'S' : '') + ' REMAINING',
      ];
      shotResultEl.innerHTML = lines.map(function (l) {
        return '<div>' + l + '</div>';
      }).join('');

      setTimeout(function () {
        if (remaining === 0) {
          advanceRound();
        } else if (shotsLeft <= 0) {
          showGameOver();
        } else {
          aimedCol = null; targetHz = null;
          setState(SHOT_STATES.AIMING);
        }
      }, 1500);
    });
  });

  // ── HUD ────────────────────────────────────────────────────────────────────
  function updateShotsHUD() {
    var total = SoundDestroyer.getRoundConfig(currentRound)[0];
    shotsRowEl.innerHTML = '';
    for (var i = 0; i < total; i++) {
      var icon = document.createElement('div');
      icon.className = 'sd-shot-icon ' + (i < shotsLeft ? 'available' : 'used');
      shotsRowEl.appendChild(icon);
    }
  }

  // ── Round start ────────────────────────────────────────────────────────────
  function startRound(round) {
    currentRound = round;
    shotsLeft    = SoundDestroyer.getRoundConfig(round)[0];
    hudRoundEl.textContent = 'ROUND ' + round;
    updateShotsHUD();
    buildGrid();
    buildColIndicators();
    _particles = [];
    aimedCol = null; targetHz = null;
    requestAnimationFrame(function () { positionCannon(4); });
    wrapEl.classList.remove('hidden');
    gameoverEl.classList.add('hidden');
    winEl.classList.add('hidden');
    setState(SHOT_STATES.AIMING);
  }

  function advanceRound() {
    if (currentRound >= 100) showWin();
    else startRound(currentRound + 1);
  }

  function showGameOver() {
    wrapEl.classList.add('hidden');
    gameoverEl.classList.remove('hidden');
    var remaining = alive.filter(Boolean).length;
    document.getElementById('sd-gameover-sub').textContent =
      remaining + ' MONSTERS SURVIVED · ROUND ' + currentRound;
  }

  function showWin() {
    wrapEl.classList.add('hidden');
    winEl.classList.remove('hidden');
  }

  // ── Restart ─────────────────────────────────────────────────────────────────
  document.getElementById('sd-restart-btn').addEventListener('click', function () {
    gameoverEl.classList.add('hidden'); startRound(1);
  });
  document.getElementById('sd-win-restart-btn').addEventListener('click', function () {
    winEl.classList.add('hidden'); startRound(1);
  });

  // ── Directions ───────────────────────────────────────────────────────────────
  document.getElementById('help-btn').addEventListener('click', function () { openDirections(DIRECTIONS); });
  var dirEl = document.getElementById('directions-text');
  if (dirEl) dirEl.textContent = DIRECTIONS;

  // ── Init ─────────────────────────────────────────────────────────────────────
  Pitch.initDial(dialCanvas, hzEl);

  document.getElementById('sd-play-btn').addEventListener('click', function () {
    splashEl.classList.add('hidden');
