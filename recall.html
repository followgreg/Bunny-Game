<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Recall — a color memory game — Bunny Game</title>
  <meta name="description" content="See the color. Remember it. Match it as closely as you can.">
  <meta property="og:title" content="Recall — Bunny Game">
  <meta property="og:description" content="See the color. Remember it. Match it as closely as you can.">
  <meta property="og:url" content="https://www.thebunnygame.com/recall">
  <meta property="og:image" content="https://www.thebunnygame.com/assets/og-images/recall-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.thebunnygame.com/assets/og-images/recall-og.png">
  <link rel="canonical" href="https://www.thebunnygame.com/recall">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#f5f0e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/recall.css">
</head>
<body>

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="canvas-wrap">

  <!-- Splash -->
  <div id="rc-splash">
    <img id="rc-logo" src="assets/logos/RECALL_LOGO.svg" alt="Recall">
    <p id="rc-directions" class="rc-directions"></p>
    <button id="rc-start-btn">Start</button>
  </div>

  <!-- Show phase: large color block + countdown -->
  <div id="rc-show" class="rc-hide">
    <p class="rc-round-label" id="rc-show-label">Round 1 of 3</p>
    <div id="rc-color-block"></div>
    <p id="rc-countdown">5</p>
  </div>

  <!-- Pick phase -->
  <div id="rc-pick" class="rc-hide">
    <p class="rc-round-label" id="rc-pick-label">Round 1 of 3</p>
    <p class="rc-prompt">What color was it?</p>
    <div class="rc-picker-wrap">
      <input type="color" id="rc-color-input" value="#808080">
      <p class="rc-tap-hint">Tap to pick your color</p>
    </div>
    <button id="rc-submit-btn">Submit</button>
  </div>

  <!-- Result phase -->
  <div id="rc-result" class="rc-hide">
    <p class="rc-round-score" id="rc-round-score">Round 1: 87 / 100</p>
    <div class="rc-swatch-row">
      <div class="rc-swatch-pair">
        <div class="rc-swatch-box" id="rc-original-swatch"></div>
        <p class="rc-swatch-label">Original</p>
      </div>
      <div class="rc-swatch-pair">
        <div class="rc-swatch-box" id="rc-picked-swatch"></div>
        <p class="rc-swatch-label">Your Pick</p>
      </div>
    </div>
    <button id="rc-next-btn">Next Round</button>
  </div>

  <!-- Session end -->
  <div id="rc-end" class="rc-hide">
    <p id="rc-total-score">Total: 250 / 300</p>
    <div id="rc-end-rounds"></div>
    <p id="rc-round-scores"></p>
    <div class="rc-end-btns">
      <button class="rc-btn-ghost"   id="rc-again-btn">Play Again</button>
      <button class="rc-btn-primary" id="rc-share-btn">Share</button>
    </div>
  </div>

</div>

<!-- Directions overlay -->
<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <p class="dir-pane" id="directions-text"></p>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/recall.js"></script>
</body>
</html>
