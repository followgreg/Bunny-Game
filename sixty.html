<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sixty — a sequence memory game — Bunny Game</title>
  <meta name="description" content="Six buttons. One sequence. Can you reach sixty steps without a mistake?">
  <meta property="og:title" content="Sixty — Bunny Game">
  <meta property="og:description" content="Six buttons. One sequence. Can you reach sixty steps without a mistake?">
  <meta property="og:url" content="https://www.thebunnygame.com/sixty">
  <meta property="og:image" content="https://www.thebunnygame.com/assets/og-images/sixty-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.thebunnygame.com/assets/og-images/sixty-og.png">
  <link rel="canonical" href="https://www.thebunnygame.com/sixty">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/sixty.css">
</head>
<body data-tab="sixty">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="sixty-wrap">

  <!-- Logo -->
  <div id="sixty-logo-wrap">
    <img src="assets/logos/sixty_logo.svg" alt="Sixty" id="sixty-logo">
  </div>

  <!-- Score bar -->
  <div id="sixty-scorebar">
    <div class="sixty-stat">
      <span class="sixty-stat-label">Round</span>
      <span class="sixty-stat-value" id="sixty-round">—</span>
    </div>
    <div class="sixty-stat sixty-stat-goal">
      <span class="sixty-stat-label">Goal</span>
      <span class="sixty-stat-value">60</span>
    </div>
    <div class="sixty-stat">
      <span class="sixty-stat-label">Best</span>
      <span class="sixty-stat-value" id="sixty-best">—</span>
    </div>
  </div>

  <!-- Status message -->
  <div id="sixty-status">Watch the sequence…</div>

  <!-- Button grid + start overlay -->
  <div id="sixty-grid-wrap">
    <div id="sixty-grid">
      <button class="sixty-btn" data-id="1" aria-label="Button 1"></button>
      <button class="sixty-btn" data-id="2" aria-label="Button 2"></button>
      <button class="sixty-btn" data-id="3" aria-label="Button 3"></button>
      <button class="sixty-btn" data-id="4" aria-label="Button 4"></button>
      <button class="sixty-btn" data-id="5" aria-label="Button 5"></button>
      <button class="sixty-btn" data-id="6" aria-label="Button 6"></button>
    </div>
    <button id="sixty-start-btn">Start</button>
  </div>

</div><!-- /#sixty-wrap -->

<!-- End screen overlay -->
<div id="sixty-overlay" class="hidden">
  <div id="sixty-modal">
    <div id="sixty-modal-emoji"></div>
    <h2 id="sixty-modal-title"></h2>
    <p id="sixty-modal-score"></p>
    <p id="sixty-modal-best"></p>
    <div id="sixty-modal-btns">
      <button id="sixty-share-btn">Share</button>
      <button id="sixty-again-btn">Play Again</button>
    </div>
  </div>
</div>

<!-- Directions popup -->
<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/sixty.js"></script>
</body>
</html>
