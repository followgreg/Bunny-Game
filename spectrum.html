<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Spectrum — Bunny Game</title>
  <meta name="description" content="Sort 100 color tiles into their correct positions in a shifting color field.">
  <meta property="og:title" content="Spectrum — Bunny Game">
  <meta property="og:description" content="Sort 100 color tiles into their correct positions in a shifting color field.">
  <meta property="og:url" content="https://www.thebunnygame.com/spectrum">
  <meta property="og:image" content="https://www.thebunnygame.com/assets/og-images/spectrum-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.thebunnygame.com/assets/og-images/spectrum-og.png">
  <link rel="canonical" href="https://www.thebunnygame.com/spectrum">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#f5f2ed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/spectrum.css">
</head>
<body>

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="canvas-wrap">

  <!-- Splash / directions screen -->
  <div id="sp-splash">
    <img id="sp-logo" src="assets/logos/spectrum_logo.svg" alt="Spectrum">
    <p id="sp-directions" class="sp-directions"></p>
    <button id="sp-start-btn">Start</button>
  </div>

  <!-- Puzzle grid (hidden until Start is tapped) -->
  <div id="sp-grid-wrap" class="sp-hide">
    <div id="sp-grid"></div>
  </div>

  <!-- Win overlay (shown on completion, Part 4) -->
  <div id="sp-win" class="sp-hide">
    <div class="sp-win-inner">
      <p class="sp-win-headline">Sorted!</p>
      <p class="sp-win-body">Every tile in its place.</p>
      <button class="sp-btn-primary" id="sp-share-btn">Share</button>
      <button class="sp-btn-ghost"   id="sp-replay-btn">New Puzzle</button>
    </div>
  </div>

</div>

<!-- Directions overlay (? button in-game) -->
<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <p class="dir-pane" id="directions-text"></p>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/spectrum.js"></script>
</body>
</html>
