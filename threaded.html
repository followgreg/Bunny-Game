<!DOCTYPE html>
<html lang="en" data-tab="threaded">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Threaded — Bunny Game</title>
  <meta name="description" content="Thread the needle. Hit every eye in one shot. How many rounds can you clear?">
  <meta property="og:title" content="Threaded — Bunny Game">
  <meta property="og:description" content="Thread the needle. Hit every eye in one shot. How many rounds can you clear?">
  <meta property="og:url" content="https://www.thebunnygame.com/threaded.html">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0b1420">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/threaded.css">
</head>
<body>

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn">How to play</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="canvas-wrap">

  <div id="th-game">

    <div id="th-hud">
      <span id="th-round-display">Round 1</span>
      <span id="th-best-display">Best: 0</span>
    </div>

    <div id="th-play-area">
      <!-- Thread lines — index 0 lowest (round 1+), 1 middle (round 2+), 2 highest (round 3+) -->
      <div class="th-thread" id="th-thread-0"></div>
      <div class="th-thread th-hide" id="th-thread-1"></div>
      <div class="th-thread th-hide" id="th-thread-2"></div>
      <!-- Eye circles, one per thread -->
      <div class="th-eye" id="th-eye-0"></div>
      <div class="th-eye th-hide" id="th-eye-1"></div>
      <div class="th-eye th-hide" id="th-eye-2"></div>
      <!-- Needle -->
      <div id="th-needle"></div>
      <!-- Hit flash -->
      <div id="th-hit-flash"></div>
    </div>

    <div id="th-controls">
      <button id="th-launch-btn">LAUNCH</button>
    </div>

    <!-- Round transition overlay -->
    <div id="th-round-screen" class="th-hide">
      <div class="th-round-inner">
        <p class="th-round-label">Round</p>
        <p class="th-round-num" id="th-round-num">2</p>
      </div>
    </div>

  </div>

</div>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to play</p>
    <p class="dir-pane" id="directions-text"></p>
    <button class="dir-close-btn" id="dir-close-btn">Got it</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/threaded.js"></script>
</body>
</html>
