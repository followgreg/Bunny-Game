<body data-tab="pitch">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
  </div>
</div>

<div id="nav-root"></div>

<!-- ── Game ──────────────────────────────────────────────────────────────── -->
<div id="pitch-wrap">
  <div id="pitch-game">

    <div id="pitch-round-label">Round 1 of 3</div>

    <div id="pitch-dial-container">
      <canvas id="pitch-dial"></canvas>
    </div>

    <div id="pitch-hz-display">— Hz</div>

    <div id="pitch-controls">
      <button class="pitch-btn" id="pitch-replay-btn">↻ Replay</button>
      <button class="pitch-btn" id="pitch-submit-btn">Submit</button>
    </div>

  </div>
</div>

<!-- ── Directions popup ───────────────────────────────────────────────────── -->
<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/pitch.js"></script>
<script>
  // ── Part 2 test init — wires dial and Replay; full game flow in Part 3 ──
  (function () {
    var DIRECTIONS = 'A target tone plays for 3 seconds. Use the dial to tune your own tone to match it — you can hear your frequency in real time as you turn. Hit Replay as many times as you need. When you think you\'ve matched the pitch, press Submit. You get a score out of 100 based on how close you are. Three rounds total.';

    document.getElementById('help-btn').addEventListener('click', function () {
      openDirections(DIRECTIONS);
    });

    var canvas   = document.getElementById('pitch-dial');
    var hzEl     = document.getElementById('pitch-hz-display');
    var replayBtn = document.getElementById('pitch-replay-btn');
    var submitBtn = document.getElementById('pitch-submit-btn');

    // Test session — Part 3 will replace with real session management
    var testFreq = Pitch.generateTargetFrequency();

    Pitch.initDial(canvas, hzEl);

    // Play target tone immediately on load (after a short delay so AudioContext
    // can start — some browsers need a gesture but Chromium allows it)
    setTimeout(function () {
      Pitch.playTargetTone(testFreq);
    }, 300);

    replayBtn.addEventListener('click', function () {
      Pitch.stopLiveTone(); // stop dial tone if dragging
      Pitch.playTargetTone(testFreq);
    });

    submitBtn.addEventListener('click', function () {
      Pitch.stopLiveTone();
      var player = Pitch.getDialFrequency();
      var score  = Pitch.scoreAccuracy(testFreq, player);
      alert('Target: ' + testFreq + ' Hz\nYour dial: ' + player + ' Hz\nScore: ' + score + ' / 100');
    });
  }());
</script>
</body>
