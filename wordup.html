<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Word Up! — Bunny Game</title>
  <meta name="description" content="A new 3×3 grid of letters every day. Find as many words as you can in 60 seconds.">
  <meta property="og:title" content="Word Up! — Bunny Game">
  <meta property="og:description" content="A new 3×3 grid of letters every day. Find as many words as you can in 60 seconds.">
  <meta property="og:url" content="https://www.thebunnygame.com/wordup.html">
  <meta property="og:image" content="https://www.thebunnygame.com/assets/og-images/wordup-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.thebunnygame.com/assets/og-images/wordup-og.png">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0D0221">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/wordup.css">
</head>
<body>

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="canvas-wrap">
  <div id="wu-game">

    <!-- Game logo -->
    <img src="assets/logos/wordup_logo.svg" alt="Word Up!" id="wu-logo">

    <!-- Status bar: timer + score -->
    <div class="wu-status-bar">
      <div id="wu-timer" class="wu-timer">1:00</div>
      <div id="wu-score-display" class="wu-score-display">0<span class="wu-pts-label"> pts</span></div>
    </div>

    <!-- Board + SVG + pre-game overlay -->
    <div class="wu-board-wrap">
      <div id="wu-grid" class="wu-grid"></div>
      <svg id="wu-svg" class="wu-svg" aria-hidden="true"></svg>
      <div id="wu-start-overlay" class="wu-start-overlay">
        <button id="wu-start-btn" class="wu-start-btn">START</button>
      </div>
    </div>

    <!-- Rotate -->
    <div class="wu-controls">
      <button class="wu-rotate-btn" id="wu-rotate-btn" aria-label="Rotate grid">
        <span class="wu-rotate-icon">&#x21BB;</span> ROTATE
      </button>
    </div>

    <!-- Feedback flash -->
    <div id="wu-feedback" class="wu-feedback" aria-live="polite"></div>

    <!-- Found words -->
    <div id="wu-found-list" class="wu-found-list"></div>

  </div>

  <!-- End overlay (covers full canvas) -->
  <div id="wu-end-overlay" class="wu-end-overlay wu-hide">
    <div class="wu-end-inner">
      <p class="wu-end-title">TIME'S UP</p>
      <div class="wu-end-score-block">
        <span id="wu-end-score-val" class="wu-end-score-val">0</span>
        <span class="wu-end-score-suffix">pts</span>
      </div>
      <div id="wu-end-best" class="wu-end-best"></div>
      <p id="wu-end-word-count" class="wu-end-word-count"></p>
      <div id="wu-end-words" class="wu-end-words"></div>
      <div class="wu-end-actions">
        <button id="wu-play-again-btn" class="wu-play-again-btn">PLAY AGAIN</button>
        <button id="wu-share-btn" class="wu-share-btn">SHARE</button>
      </div>
    </div>
  </div>
</div>

<!-- Directions overlay -->
<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <p class="dir-pane" id="directions-text"></p>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/wordup.js"></script>
</body>
</html>
