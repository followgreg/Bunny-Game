<body data-tab="bunnyhop">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
    <button class="icon-btn" id="new-btn">↺ New</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="stats">
  <div class="stat-item">
    <span class="stat-label">Bunnies</span>
    <span class="stat-value" id="val-remaining">—</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Moves</span>
    <span class="stat-value" id="val-moves">0</span>
  </div>
</div>

<div id="bunnyhop-wrap">
  <div class="bh-fence">
    <div class="bh-post bh-post-tl"></div>
    <div class="bh-post bh-post-tr"></div>
    <div class="bh-post bh-post-bl"></div>
    <div class="bh-post bh-post-br"></div>
    <div id="bunnyhop-board"></div>
  </div>
</div>

<div id="overlay" class="hidden">
  <div class="modal">
    <div id="perf-banner" class="hidden"></div>
    <h2 id="modal-title">Game Over</h2>
    <p class="modal-score" id="modal-score"></p>
    <p class="modal-sub"   id="modal-sub"></p>
    <div class="breakdown" id="modal-breakdown"></div>
    <button class="play-again-btn" id="play-again-btn">Play Again</button>
    <button class="share-btn" id="share-btn">Share Score</button>
  </div>
</div>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>
