<html lang="en" data-tab="wave">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Wave — a flag recognition streak game — Bunny Game</title>
  <meta name="description" content="One flag. One sweep. Four guesses. How many countries can you name before you miss?">
  <meta property="og:title" content="Wave — Bunny Game">
  <meta property="og:description" content="One flag. One sweep. Four guesses. How many countries can you name before you miss?">
  <meta property="og:url" content="https://www.thebunnygame.com/wave">
  <meta property="og:image" content="https://www.thebunnygame.com/assets/og-images/wave-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.thebunnygame.com/assets/og-images/wave-og.png">
  <link rel="canonical" href="https://www.thebunnygame.com/wave">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>

    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">

<body>

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn">How to play</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="canvas-wrap">

  <!-- Loading -->
  <div id="wv-loading" class="wv-center">
    <p class="wv-loading-text">Loading flags…</p>
  </div>

  <!-- Game -->
  <div id="wv-game" class="wv-hide">
    <div class="wv-info" id="wv-info">Streak: 0 · Best: 0</div>
    <div class="wv-flag-wrap">
      <div class="wv-flag-reveal" id="wv-flag-reveal">
        <img class="wv-flag-img" id="wv-flag-img" src="" alt="Flag" loading="eager">
      </div>
    </div>
    <div class="wv-options" id="wv-options"></div>
  </div>

  <!-- End screen (wrong answer) -->
  <div id="wv-end" class="wv-hide wv-end-screen">
    <h2 class="wv-end-headline">Wave</h2>
    <div id="wv-streak-display" class="wv-streak-display"></div>
    <p id="wv-reveal-text" class="wv-reveal-text"></p>
    <div class="wv-end-btns">
      <button id="wv-share" class="wv-btn-primary">Share</button>
      <button id="wv-play-again" class="wv-btn-ghost">Play Again</button>
    </div>
  </div>

  <!-- Win screen (completed the world) -->
  <div id="wv-win" class="wv-hide wv-win-screen">
    <h2 class="wv-win-headline">You've Completed The World</h2>
    <p class="wv-win-sub" id="wv-win-sub"></p>
    <div class="wv-end-btns">
      <button id="wv-win-share" class="wv-btn-primary">Share</button>
      <button id="wv-win-play-again" class="wv-btn-ghost">Play Again</button>
    </div>
  </div>

</div>

<footer id="footer">
  <span>©2026 Never Stop Creating, LLC</span>
  <span>·</span>
  <a href="mailto:info@neverstopcreatingllc.com">info@neverstopcreatingllc.com</a>
  <span>·</span>
  <a href="macigame.html">About</a>
</footer>

<div id="overlay" class="hidden">
  <div class="modal">
    <div id="perf-banner" class="hidden"></div>
    <h2 id="modal-title"></h2>
    <p class="modal-score" id="modal-score"></p>
    <p class="modal-sub" id="modal-sub"></p>
    <div class="breakdown" id="breakdown" style="display:none"></div>
    <button class="play-again-btn" id="play-again-btn"></button>
    <button class="share-btn" id="share-btn" style="display:none"></button>
  </div>
</div>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to play</p>
    <p class="dir-pane" id="directions-text"></p>
    <button class="dir-close-btn" id="dir-close-btn">Got it</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/wave.js"></script>
</body>
</html>
