<!DOCTYPE html>
<html lang="en" data-tab="fuse">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fuse — a path puzzle game — Bunny Game</title>
  <meta name="description" content="Trace every cell. Land the final step exactly on the spark.">
  <meta property="og:title" content="Fuse — Bunny Game">
  <meta property="og:description" content="Trace every cell. Land the final step exactly on the spark.">
  <meta property="og:url" content="https://www.thebunnygame.com/fuse">
  <meta property="og:image" content="https://www.thebunnygame.com/assets/og-images/fuse-og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.thebunnygame.com/assets/og-images/fuse-og.png">
  <link rel="canonical" href="https://www.thebunnygame.com/fuse">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bunny Game">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HC7SYBNKX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7HC7SYBNKX');
  </script>
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/shared.css">
  <link rel="stylesheet" href="assets/css/fuse.css">
</head>
<body>

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn">How to play</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="canvas-wrap">

  <!-- Start screen -->
  <div id="fz-start" class="fz-screen">
    <div class="fz-start-inner">
      <img src="assets/logos/fuse_logo.svg" alt="Fuse" class="fz-logo-img">
      <p class="fz-sub">Trace every cell. Land the final step exactly on the spark.</p>
      <div class="fz-start-btns" id="fz-start-btns">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Game screen -->
  <div id="fz-game" class="fz-screen fz-hide">
    <div class="fz-hud" id="fz-hud">
      <span id="fz-level-label">Level 1</span>
      <span id="fz-furthest-label">Furthest: 1</span>
    </div>

    <div class="fz-board-wrap" id="fz-board-wrap">
      <div class="fz-board" id="fz-board"></div>

      <!-- Fail overlay -->
      <div id="fz-fail" class="fz-overlay fz-hide">
        <p class="fz-overlay-label" id="fz-fail-label">Stuck!</p>
        <p class="fz-overlay-count" id="fz-fail-count"></p>
        <button class="fz-btn-primary" id="fz-retry">Retry Level</button>
      </div>

      <!-- Level-complete overlay -->
      <div id="fz-complete" class="fz-overlay fz-hide">
        <p class="fz-overlay-big" id="fz-complete-label"></p>
        <button class="fz-btn-primary" id="fz-next">Next Level</button>
      </div>
    </div>

    <div class="fz-dpad" id="fz-dpad">
      <button class="fz-dir fz-up"    id="fz-up">▲</button>
      <button class="fz-dir fz-left"  id="fz-left">◀</button>
      <button class="fz-dir fz-down"  id="fz-down">▼</button>
      <button class="fz-dir fz-right" id="fz-right">▶</button>
    </div>
  </div>

  <!-- Full-game win screen -->
  <div id="fz-win" class="fz-screen fz-hide">
    <div class="fz-win-inner">
      <p class="fz-win-logo-text">Fuse</p>
      <h2 class="fz-win-headline">Complete</h2>
      <p class="fz-win-sub">All 25 fuses extinguished.</p>
      <div class="fz-end-btns">
        <button class="fz-btn-primary" id="fz-share">Share</button>
        <button class="fz-btn-ghost"   id="fz-play-again">Play Again</button>
      </div>
    </div>
  </div>

</div>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to play</p>
    <p class="dir-pane" id="directions-text"></p>
    <button class="dir-close-btn" id="dir-close-btn">Got it</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/fuse.js"></script>
</body>
</html>
