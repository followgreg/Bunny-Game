  <link rel="icon" type="image/svg+xml" href="assets/icons/blue-bunny.svg">
  <link rel="apple-touch-icon" href="Icons/apple-touch-icon.png">
  <meta name="theme-color" content="#120c08">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body data-tab="proof">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
  </div>
</div>

<div id="nav-root"></div>

<!-- ── Game wrap ─────────────────────────────────────────────────────────── -->
<div id="pf-wrap">

  <!-- Loading -->
  <div id="pf-loading" class="pf-center-section">
    <div class="pf-spinner"></div>
    <p class="pf-loading-text">Loading today's passage&hellip;</p>
  </div>

  <!-- Error -->
  <div id="pf-error" class="pf-center-section pf-hide">
    <p class="pf-error-icon">&#128214;</p>
    <p class="pf-error-msg">Couldn't reach the library.<br>Check your connection and try again.</p>
    <button class="pf-btn" id="pf-retry-btn">Try Again</button>
  </div>

  <!-- Splash -->
  <div id="pf-splash" class="pf-center-section pf-hide">
    <div class="pf-logo-wrap">
      <img src="assets/logos/proof_logo.svg" alt="Proof" class="pf-logo">
    </div>
    <p class="pf-splash-tagline">One word has been deliberately mistyped.<br>Find it as fast as you can.</p>
    <div class="pf-source-badge" id="pf-splash-source"></div>
    <button class="pf-btn pf-btn-start" id="pf-start-btn">Start</button>
  </div>

  <!-- Game -->
  <div id="pf-game" class="pf-hide">
    <div class="pf-timer-bar">
      <span class="pf-timer-label">Time</span>
      <span class="pf-timer" id="pf-timer">0.00s</span>
    </div>
    <div class="pf-passage-card">
      <div class="pf-passage" id="pf-passage"></div>
    </div>
    <p class="pf-hint">Tap the typo to stop the clock.</p>
  </div>

  <!-- Result -->
  <div id="pf-result" class="pf-hide">
    <div class="pf-result-header">
      <img src="assets/logos/proof_logo.svg" alt="Proof" class="pf-result-logo">
      <div class="pf-result-time-block">
        <span class="pf-result-label">Your time</span>
        <span class="pf-result-time" id="pf-result-time"></span>
      </div>
    </div>
    <div class="pf-passage-card pf-result-passage-card">
      <div class="pf-passage pf-result-passage" id="pf-result-passage"></div>
    </div>
    <p class="pf-result-source" id="pf-result-source"></p>
    <button class="pf-btn pf-btn-share" id="pf-share-btn">Share Result</button>
    <p class="pf-comeback">Come back tomorrow for a new passage.</p>
  </div>

</div><!-- /#pf-wrap -->

<!-- ── Directions popup ──────────────────────────────────────────────────── -->
<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/proof.js"></script>
</body>
</html>
