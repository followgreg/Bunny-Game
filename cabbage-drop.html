<body data-tab="cabbagdrop">

<div id="header">
  <h1><img src="Icons/BunnyGameLogo.svg" alt="Bunny Game" style="height:30px;filter:brightness(0) invert(1);display:block;"></h1>
  <div class="header-controls">
    <button class="icon-btn" id="help-btn" aria-label="How to play">?</button>
    <button class="icon-btn" id="new-btn">↺ New</button>
  </div>
</div>

<div id="nav-root"></div>

<div id="stats">
  <div class="stat-item">
    <span class="stat-label">Time</span>
    <span class="stat-value cd-timer" id="val-cd-timer">1:00</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Score</span>
    <span class="stat-value" id="val-score">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Best</span>
    <span class="stat-value" id="val-cd-best">—</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Groups</span>
    <span class="stat-value" id="val-moves">0</span>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game-canvas"></canvas>
  <div id="cd-hud">
    <span id="cd-hud-score">0</span>
    <span id="cd-hud-sep">|</span>
    <span id="cd-hud-timer">1:00</span>
  </div>
  <div id="cd-flash"></div>
  <div id="cd-start-overlay">
    <button id="cd-start-btn">▶ START</button>
  </div>
</div>

<footer id="footer">
  <span>©2026 Never Stop Creating, LLC</span>
  <span>·</span>
  <a href="mailto:info@neverstopcreatingllc.com">info@neverstopcreatingllc.com</a>
  <span>·</span>
  <a href="macigame.html">About</a>
</footer>

<div id="overlay" class="hidden">
  <div class="modal">
    <button id="modal-close-btn" aria-label="Close">✕</button>
    <div id="perf-banner" class="hidden"></div>
    <h2 id="modal-title">TIME'S UP</h2>
    <p class="modal-score" id="modal-score"></p>
    <p class="modal-sub"   id="modal-sub"></p>
    <div class="breakdown" id="modal-breakdown"></div>
    <button class="play-again-btn" id="play-again-btn">Play Again</button>
    <button class="share-btn" id="share-btn">Share Score</button>
  </div>
</div>

<div id="directions-overlay" class="hidden">
  <div class="directions-modal">
    <p class="dir-heading">How to Play</p>
    <div class="dir-pane" id="directions-text"></div>
    <button class="dir-close-btn" id="dir-close-btn">Got It</button>
  </div>
</div>

<script src="assets/js/nav.js"></script>
<script src="assets/js/shared.js"></script>
<script src="assets/js/cabbage-drop.js"></script>
</body>
